name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync code to app directory
        run: |
          rsync -av --delete . /home/manisha/flask-ci-cd-app/

      - name: Ensure venv exists
        run: |
          cd /home/manisha/flask-ci-cd-app
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi

      - name: Install dependencies (Flask + pymongo)
        run: |
          cd /home/manisha/flask-ci-cd-app
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Restart Flask service
        run: |
          sudo systemctl restart flaskapp

      - name: Verify Flask + MongoDB response
        run: |
          # Wait a bit for the service to restart
          sleep 5
          # Call the app's root URL from the VM itself
          curl http://127.0.0.1:5000/ || exit 1
